settings:
  skillflow.solr.resultPageIds:
    label: 'Skill listing page IDs (empty-query browse)'
    description: >
      Comma-separated page UIDs that host the skillflow solr_pi_results plugin as a
      browsable skills directory. On exactly these pages the plugin shows the full
      skill catalogue on the empty landing query (and allows empty queries). Leave
      empty to keep the plugin behaving as a normal search box everywhere — so the
      site's general Solr search is never forced to dump all results.
    type: string
    default: ''
